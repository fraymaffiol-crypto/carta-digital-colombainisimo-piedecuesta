<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta name="theme-color" content="#3b1f0a" />
  <meta name="description" content="Carta digital de Colombianísimo Piedecuesta — Carnes y comida típica colombiana." />
  <title>Colombianísimo Piedecuesta · Carta Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --brand-dark:   #2a1205;
      --brand-brown:  #5c3a21;
      --brand-mid:    #7d4e2d;
      --brand-gold:   #c9922b;
      --brand-cream:  #f5e6cc;
      --nav-h:        60px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      background-color: var(--brand-dark);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--brand-dark);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ─── NAVBAR ─────────────────────────────── */
    #navbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--nav-h);
      background: rgba(30, 10, 2, 0.93);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid rgba(201,146,43,0.3);
      display: flex;
      align-items: stretch;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: rgba(245,230,204,0.6);
      text-decoration: none;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.2s, background 0.2s;
      padding: 6px 2px 8px;
      position: relative;
    }

    .nav-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .nav-btn.active,
    .nav-btn:active {
      color: var(--brand-gold);
      background: rgba(201,146,43,0.08);
    }

    .nav-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 2px;
      background: var(--brand-gold);
      border-radius: 0 0 2px 2px;
      transform: scaleX(0);
      transition: transform 0.2s;
    }

    .nav-btn.active::after { transform: scaleX(1); }

    /* ─── SECTIONS ───────────────────────────── */
    .menu-section {
      width: 100%;
      position: relative;
    }

    .menu-section img {
      width: 100%;
      display: block;
      object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
    }

    /* ─── SOCIAL BUTTONS ─────────────────────── */
    #social-bar {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      padding: 20px 16px 24px;
      background: var(--brand-dark);
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.15s, filter 0.15s;
      letter-spacing: 0.02em;
    }

    .social-btn:active { transform: scale(0.96); filter: brightness(0.9); }

    .btn-instagram {
      background: linear-gradient(135deg, #f9ce34, #ee2a7b, #6228d7);
      color: #fff;
    }

    .btn-tiktok {
      background: #111;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* ─── BOTTOM PADDING for navbar ─────────── */
    #main-content {
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 8px));
    }

    /* ─── LOADER ─────────────────────────────── */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--brand-dark);
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.5s, visibility 0.5s;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-logo {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 900;
      color: var(--brand-cream);
      text-align: center;
      line-height: 1.2;
    }

    .loader-logo span {
      display: block;
      font-size: 13px;
      font-weight: 400;
      font-family: 'DM Sans', sans-serif;
      color: var(--brand-gold);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .loader-bar {
      width: 160px;
      height: 3px;
      background: rgba(201,146,43,0.2);
      border-radius: 2px;
      overflow: hidden;
    }

    .loader-bar-fill {
      height: 100%;
      background: var(--brand-gold);
      border-radius: 2px;
      animation: loadBar 0.8s ease-in-out forwards;
    }

    @keyframes loadBar {
      from { width: 0%; }
      to   { width: 100%; }
    }

    /* ─── DESKTOP cap ────────────────────────── */
    @media (min-width: 600px) {
      #app-frame {
        max-width: 480px;
        margin: 0 auto;
      }
      #navbar {
        max-width: 480px;
        left: 50%;
        transform: translateX(-50%);
        right: auto;
        width: 480px;
        border-radius: 16px 16px 0 0;
        border-left: 1px solid rgba(201,146,43,0.2);
        border-right: 1px solid rgba(201,146,43,0.2);
      }
    }
  </style>
</head>

    <div class="loader-logo">

      <span>Piedecuesta</span>
    </div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  </div>

  <script>
    // ── Hide loader after first image is ready ──────────────────────
    const loader  = document.getElementById('loader');
    const firstImg = document.querySelector('#inicio img');

    function hideLoader() {
      setTimeout(() => loader.classList.add('hidden'), 300);
    }

    if (firstImg.complete) {
      hideLoader();
    } else {
      firstImg.addEventListener('load',  hideLoader, { once: true });
      firstImg.addEventListener('error', hideLoader, { once: true });
    }

    // ── Active nav on scroll (IntersectionObserver) ─────────────────
    const sections  = document.querySelectorAll('.menu-section');
    const navBtns   = document.querySelectorAll('.nav-btn');

    const sectionMap = {};
    sections.forEach(s => { sectionMap[s.id] = s; });

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const id = entry.target.id;
          navBtns.forEach(btn => {
            btn.classList.toggle('active', btn.dataset.section === id);
          });
        }
      });
    }, { threshold: 0.4 });

    sections.forEach(s => observer.observe(s));

    // ── Prevent navbar from covering active section on tap ──────────
    navBtns.forEach(btn => {
      btn.addEventListener('click', e => {
        const targetId = btn.getAttribute('href').slice(1);
        const target   = document.getElementById(targetId);
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });
  </script>
